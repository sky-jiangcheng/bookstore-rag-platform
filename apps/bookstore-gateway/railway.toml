# Gateway 服务 Railway 配置

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# 健康检查
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# 资源配置
[deploy.resources]
memory = "1024"  # 1GB
cpu = "1.0"      # 1 vCPU

# 服务配置
[[services]]
name = "gateway"
type = "web"
plan = "starter"

# 健康检查配置
[[services.healthCheck]]
path = "/health"
interval = 30
timeout = 10
retries = 3

# 环境变量（在 Railway 控制台配置）
