[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
extend-exclude = '''/(\n    \.git\n  | \.venv\n  | node_modules\n  | dist\n  | build\n)/'''

[tool.isort]
profile = "black"
line_length = 88
known_standard_library = ["os", "sys", "json", "datetime", "collections", "typing"]
known_third_party = ["fastapi", "uvicorn", "sqlalchemy", "pydantic", "requests", "redis", "pandas", "gensim", "numpy", "jose", "passlib", "qdrant_client", "lancedb", "pyarrow"]
known_first_party = ["app"]

[tool.flake8]
max-line-length = 88
extend-ignore = ["E203", "W503", "E501"]
exclude = ["__pycache__", ".git", ".venv", "node_modules", "dist", "build"]

[tool.mypy]
python_version = "3.10"
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
strict_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = true
disallow_untyped_calls = true
site_packages = false

[[tool.mypy.overrides]]
module = "app.*"
disallow_untyped_defs = false

[tool.pytest.ini_options]
markers = [
    "asyncio: async test cases run through the local pytest shim",
]
testpaths = [
    "backend/tests",
]
