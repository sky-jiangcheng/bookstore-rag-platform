# Catalog 服务 Railway 配置

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.resources]
memory = "1024"
cpu = "1.0"

[[services]]
name = "catalog"
type = "web"
plan = "starter"

[[services.healthCheck]]
path = "/health"
interval = 30
timeout = 10
retries = 3

