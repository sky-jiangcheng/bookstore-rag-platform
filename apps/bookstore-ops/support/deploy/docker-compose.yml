services:
  redis:
    image: redis:7.0.12
    container_name: bookstore-redis
    ports:
      - "6379:6379"
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.9.5
    container_name: bookstore-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-storage:/qdrant/storage
    networks:
      - bookstore-network

  gateway:
    build:
      context: ../../../store-gateway
      dockerfile: Dockerfile
    container_name: bookstore-gateway
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      rag:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # 数据库配置（宿主机 MySQL）
      DB_HOST: ${LOCAL_MYSQL_HOST:-host.docker.internal}
      DB_PORT: ${LOCAL_MYSQL_PORT:-3306}
      DB_USER: ${LOCAL_MYSQL_USER:-root}
      DB_PASSWORD: ${LOCAL_MYSQL_PASSWORD:-}
      DB_NAME: ${LOCAL_MYSQL_DATABASE:-bookstore}
      # Redis 配置
      REDIS_URL: redis://redis:6379/0
      # Qdrant 配置
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      RAG_SERVICE_URL: http://rag:8000
      # API 配置
      CORS_ORIGINS: "http://localhost:5173,http://localhost,http://localhost:80"
      # 应用环境
      APP_ENV: development
      BOOKSTORE_SERVICE_PROFILE: gateway
      # API 密钥（如果有）
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      QWEN_API_KEY: ${QWEN_API_KEY}
    networks:
      - bookstore-network

  auth:
    build:
      context: ../../../store-auth
      dockerfile: Dockerfile
    container_name: bookstore-auth
    ports:
      - "8001:8000"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      rag:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: ${LOCAL_MYSQL_HOST:-host.docker.internal}
      DB_PORT: ${LOCAL_MYSQL_PORT:-3306}
      DB_USER: ${LOCAL_MYSQL_USER:-root}
      DB_PASSWORD: ${LOCAL_MYSQL_PASSWORD:-}
      DB_NAME: ${LOCAL_MYSQL_DATABASE:-bookstore}
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      RAG_SERVICE_URL: http://rag:8000
      CORS_ORIGINS: "http://localhost:5173,http://localhost,http://localhost:80"
      APP_ENV: development
      BOOKSTORE_SERVICE_PROFILE: auth
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      QWEN_API_KEY: ${QWEN_API_KEY}
    networks:
      - bookstore-network

  rag:
    build:
      context: ../../../store-rag
      dockerfile: Dockerfile
    container_name: bookstore-rag
    ports:
      - "8002:8000"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: ${LOCAL_MYSQL_HOST:-host.docker.internal}
      DB_PORT: ${LOCAL_MYSQL_PORT:-3306}
      DB_USER: ${LOCAL_MYSQL_USER:-root}
      DB_PASSWORD: ${LOCAL_MYSQL_PASSWORD:-}
      DB_NAME: ${LOCAL_MYSQL_DATABASE:-bookstore}
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      CORS_ORIGINS: "http://localhost:5173,http://localhost,http://localhost:80"
      APP_ENV: development
      BOOKSTORE_SERVICE_PROFILE: rag
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      QWEN_API_KEY: ${QWEN_API_KEY}
    networks:
      - bookstore-network

  catalog:
    build:
      context: ../../../store-catalog
      dockerfile: Dockerfile
    container_name: bookstore-catalog
    ports:
      - "8003:8000"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      rag:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: ${LOCAL_MYSQL_HOST:-host.docker.internal}
      DB_PORT: ${LOCAL_MYSQL_PORT:-3306}
      DB_USER: ${LOCAL_MYSQL_USER:-root}
      DB_PASSWORD: ${LOCAL_MYSQL_PASSWORD:-}
      DB_NAME: ${LOCAL_MYSQL_DATABASE:-bookstore}
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      RAG_SERVICE_URL: http://rag:8000
      CORS_ORIGINS: "http://localhost:5173,http://localhost,http://localhost:80"
      APP_ENV: development
      BOOKSTORE_SERVICE_PROFILE: catalog
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      QWEN_API_KEY: ${QWEN_API_KEY}
    networks:
      - bookstore-network

  ops:
    build:
      context: ../../../store-ops
      dockerfile: Dockerfile
    container_name: bookstore-ops
    ports:
      - "8004:8000"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      rag:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: ${LOCAL_MYSQL_HOST:-host.docker.internal}
      DB_PORT: ${LOCAL_MYSQL_PORT:-3306}
      DB_USER: ${LOCAL_MYSQL_USER:-root}
      DB_PASSWORD: ${LOCAL_MYSQL_PASSWORD:-}
      DB_NAME: ${LOCAL_MYSQL_DATABASE:-bookstore}
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      RAG_SERVICE_URL: http://rag:8000
      CORS_ORIGINS: "http://localhost:5173,http://localhost,http://localhost:80"
      APP_ENV: development
      BOOKSTORE_SERVICE_PROFILE: ops
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      QWEN_API_KEY: ${QWEN_API_KEY}
    networks:
      - bookstore-network

  frontend:
    build:
      context: ../../../store-frontend
      dockerfile: Dockerfile
    container_name: bookstore-frontend
    ports:
      - "80:80"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - bookstore-network

networks:
  bookstore-network:
    driver: bridge

volumes:
  qdrant-storage:
