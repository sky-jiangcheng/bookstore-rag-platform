# Ops 服务 Railway 配置

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.resources]
memory = "512"
cpu = "0.5"

[[services]]
name = "ops"
type = "web"
plan = "free"

[[services.healthCheck]]
path = "/health"
interval = 30
timeout = 10
retries = 3

